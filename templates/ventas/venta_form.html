{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="vp-page">
    <div class="container">
        <div class="vp-pagetitle">
            <h1><i class="bi bi-cart-plus"></i> Nueva Venta</h1>
        </div>
        <form method="post" novalidate id="ventaForm">
            {% csrf_token %}

            <!-- Agente Info -->
            <div class="card mb-4">
                <div class="card-header"><h5><i class="bi bi-person-badge"></i> Agente</h5></div>
                <div class="card-body">
                    <p class="form-control-plaintext" style="padding: 0;">{{ agente_nombre_auto|default:'—' }}</p>
                    <p class="form-control-plaintext" style="padding: 0; color: var(--vp-text-secondary); font-size: 0.9em;">Supervisor: {{ supervisor_nombre_auto|default:'—' }}</p>
                </div>
            </div>

            {% include 'ventas/_venta_form_fields.html' %}

            <div class="d-flex gap-2 justify-content-end">
                <a href="{% url 'ventas:venta_list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-save"></i> Guardar Venta</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
