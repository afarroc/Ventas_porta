{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Sistema de Gestión de Ventas</h1>
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Administración</h5>
                    <p class="card-text">Gestión de ventas y seguimiento.</p>
                    <a href="{% url 'ventas:venta_list' %}" class="btn btn-primary">Ver Ventas</a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Discador</h5>
                    <p class="card-text">Gestión de bases de llamada.</p>
                    <a href="{% url 'discador:base_list' %}" class="btn btn-secondary">Ver Bases</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
