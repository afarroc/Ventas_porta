<!-- templates/registration/login.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-center" style="margin-top:40px">
    <div style="width:400px;max-width:100%">
      <div class="card">
        <div class="card-header" style="background:var(--vp-primary);color:#fff">
          <h4 style="margin:0;font-size:16px;font-weight:700">Iniciar Sesión</h4>
        </div>
        <div class="card-body">
          <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_username" class="form-label">Usuario</label>
              <input type="text" name="username" id="id_username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label for="id_password" class="form-label">Contraseña</label>
              <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            {% if form.errors %}
              <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
